services:
  - type: web
    name: projet5-backend
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: projet5-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: projet5-db
    databaseName: projet5
    user: projet5_user
    region: oregon
